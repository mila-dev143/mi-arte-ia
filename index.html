<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Arte Haikyu ✨</title>
    <style>
        body {
            background-color: #ffe6f2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a0026;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 12px 32px rgba(255, 105, 180, 0.25);
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 900px;
            width: 100%;
            border: 4px solid #ffb3d9;
            gap: 40px;
        }
        .image-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }
        .ia-image {
            display: none;
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
        }
        .info-side {
            flex: 1;
            text-align: left;
        }
        h1 {
            color: #ff66b2;
            margin-bottom: 15px;
            font-size: 32px;
            font-weight: bold;
        }
        p {
            color: #4a0026;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-label {
            background: white;
            padding: 0 5px;
            font-size: 14px;
            color: #ff66b2;
            position: absolute;
            top: -10px;
            left: 20px;
        }
        .input-box {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #ffb3d9;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .input-box:focus {
            border-color: #ff66b2;
            box-shadow: 0 0 8px rgba(255, 105, 180, 0.4);
        }
        .btn {
            background-color: #ff66b2;
            color: white;
            border: none;
            padding: 15px 0;
            width: 100%;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 14px rgba(255, 105, 180, 0.3);
        }
        .btn:hover {
            background-color: #ff3399;
            transform: translateY(-2px);
        }
        .loader {
            display: none;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff66b2;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer-links {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            font-size: 14px;
        }
        .footer-links a {
            color: #ff66b2;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
